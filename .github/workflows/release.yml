name: release

# Publica no PyPI quando uma tag vX.Y.Z é enviada.
# Usa Trusted Publishing (OIDC) — nenhum token/segredo fica no repositório.
# Pré-requisito (uma vez, no PyPI): configurar o "trusted publisher" do projeto
# schoolmock-br apontando para este repo, workflow release.yml e environment pypi.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/schoolmock-br/
    permissions:
      id-token: write  # exigido pelo Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
